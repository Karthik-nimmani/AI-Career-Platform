services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    # Mount the local ChromaDB database directory to persist data
    volumes:
      - backend_chromadb:/app/chroma_db
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Maps the variables from the root .env or terminal environment into Next.js build-time arguments
        - NEXT_PUBLIC_SUPABASE_URL=${SUPABASE_URL:-https://your-supabase-project.supabase.co}
        - NEXT_PUBLIC_SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  backend_chromadb:
